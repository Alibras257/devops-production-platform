global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "flask-backend"
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:5000

  - job_name: "node-exporter"
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: "prometheus"
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: "alertmanager"
    static_configs:
      - targets:
          - alertmanager:9093