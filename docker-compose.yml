services:
  backend:
    build:
      context: ./app/backend

    ports:
      - "5000:5000"

    environment:
      FLASK_ENV: development

    depends_on:
      - postgres

    networks:
      - devops-network

  postgres:
    image: postgres:16

    restart: unless-stopped

    environment:
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: devops_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - devops-network

volumes:
  postgres_data:

networks:
  devops-network:
